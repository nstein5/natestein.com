<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio // NSTEIN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #00ff41;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Scanline effect */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 255, 65, 0.03),
        rgba(0, 255, 65, 0.03) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    header {
      border: 2px solid #00ff41;
      padding: 15px 20px;
      margin-bottom: 30px;
      background: rgba(0, 20, 0, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
      position: relative;
    }

    header::before {
      content: "root@natestein:~$";
      position: absolute;
      top: -12px;
      left: 15px;
      background: #0d0d0d;
      padding: 0 10px;
      font-size: 0.9em;
      color: #00ff41;
    }

    h1 {
      font-size: 1.8em;
      text-shadow: 0 0 10px #00ff41;
      letter-spacing: 2px;
    }

    .back-link {
      display: inline-block;
      color: #00cc33;
      text-decoration: none;
      font-size: 0.9em;
      margin-bottom: 25px;
      transition: color 0.2s ease;
      letter-spacing: 1px;
    }

    .back-link:hover {
      color: #00ff41;
      text-shadow: 0 0 8px #00ff41;
    }

    .back-link::before {
      content: "< ";
    }

    .section-label {
      font-size: 0.85em;
      color: #009922;
      letter-spacing: 3px;
      margin-bottom: 12px;
      margin-top: 35px;
      padding-left: 5px;
    }

    .section-label::before {
      content: "## ";
      color: #00ff41;
    }

    .entry {
      border: 1px solid #00ff41;
      padding: 16px 20px;
      margin-bottom: 12px;
      background: rgba(0, 20, 0, 0.6);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
    }

    .entry:hover {
      background: rgba(0, 40, 0, 0.85);
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
      border-color: #00ff41;
      transform: translateX(4px);
    }

    .entry-info { flex: 1; }

    .entry-title {
      font-size: 1em;
      color: #00ff41;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .entry-meta {
      font-size: 0.78em;
      color: #009922;
      letter-spacing: 1px;
    }

    .entry-link {
      color: #00ff41;
      text-decoration: none;
      border: 1px solid #00ff41;
      padding: 6px 14px;
      font-size: 0.85em;
      white-space: nowrap;
      transition: all 0.25s ease;
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .entry-link:hover {
      background: #00ff41;
      color: #0d0d0d;
      box-shadow: 0 0 12px #00ff41;
    }

    footer {
      margin-top: 50px;
      padding: 20px;
      text-align: center;
      border-top: 1px solid #00ff41;
      color: #00cc33;
      font-size: 0.9em;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      height: 20px;
      background: #00ff41;
      animation: blink 1s infinite;
      margin-left: 5px;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .entry { flex-direction: column; align-items: flex-start; }
      .entry-link { align-self: flex-start; }
      h1 { font-size: 1.4em; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>PORTFOLIO.DIR<span class="cursor"></span></h1>
    </header>

    <a href="index.html" class="back-link">BACK_TO_INDEX</a>

    <div class="section-label">PRESENTATIONS &amp; SLIDES</div>

    <div class="entry">
      <div class="entry-info">
        <div class="entry-title">YOUR_PRESENTATION_TITLE</div>
        <div class="entry-meta">TOPIC // YEAR</div>
      </div>
      <a href="#" class="entry-link">OPEN_SLIDES</a>
    </div>

    <div class="section-label">PAPERS &amp; WRITING</div>

    <div class="entry">

        <div class="entry-title">YOUR_PAPER_TITLE</div>
        <div class="entry-meta">SUBJECT // YEAR</div>
      </div>
      <a href="#" class="entry-link">READ_PAPER</a>
    </div>

    <footer>
      <p>© 2026 NSTEIN_SYSTEMS // ALL_RIGHTS_RESERVED</p>
    </footer>
  </div>
</body>
</html>
